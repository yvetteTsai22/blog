name: Build Tool Recommends & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # Setup Node.js for building React tool-recommends
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # Setup Ruby for Jekyll
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true

    # Build Jekyll site FIRST (it clears _site directory)
    - name: Build Jekyll site
      run: bundle exec jekyll build --baseurl '/blog'

    # Build tool-recommend landing pages AFTER Jekyll (so they don't get overwritten)
    - name: Build tool-recommend pages
      run: |
        echo "🚀 Building tool-recommend landing pages..."

        # Build product-1
        echo "📦 Building product-1..."
        cd _tool-recommends/product-1
        npm install --legacy-peer-deps > /dev/null 2>&1
        npm run build > /dev/null 2>&1
        cd ../..
        mkdir -p _site/tool-recommend/product-1
        cp -r _tool-recommends/product-1/build/* _site/tool-recommend/product-1/

        # Build product-2
        echo "📦 Building product-2..."
        cd _tool-recommends/product-2
        npm install --legacy-peer-deps > /dev/null 2>&1
        npm run build > /dev/null 2>&1
        cd ../..
        mkdir -p _site/tool-recommend/product-2
        cp -r _tool-recommends/product-2/build/* _site/tool-recommend/product-2/

        echo "✅ Tool recommend pages built successfully!"

    # Deploy to GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
        cname: yourdomain.github.io
