name: Build Tool Recommends & Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # Setup Node.js for building React tool-recommends
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # Setup Ruby for Jekyll
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true

    # Build Jekyll site FIRST (it clears _site directory)
    - name: Build Jekyll site
      run: bundle exec jekyll build --baseurl '/blog'

    # Build tool-recommend landing pages AFTER Jekyll (so they don't get overwritten).
    # Auto-discovers any subdirectory of _tool-recommends/ that has a package.json —
    # no changes needed here when adding a new product.
    - name: Build tool-recommend pages
      run: |
        echo "🚀 Building tool-recommend landing pages..."

        for pkg in _tool-recommends/*/package.json; do
          dir=$(dirname "$pkg")
          name=$(basename "$dir")

          echo "📦 Building $name..."
          cd "$dir"
          npm install --legacy-peer-deps > /dev/null 2>&1
          npm run build > /dev/null 2>&1
          cd ../..

          if [ -d "$dir/dist" ]; then out_dir="$dir/dist"; else out_dir="$dir/build"; fi
          mkdir -p "_site/tool-recommend/$name"
          cp -r "$out_dir/." "_site/tool-recommend/$name/"
        done

        echo "📦 Building fire-calculator..."
        cd fire-calculator
        npm install > /dev/null 2>&1
        npm run build > /dev/null 2>&1
        cd ..
        mkdir -p _site/fire-calculator
        cp -r fire-calculator/dist/. _site/fire-calculator/

        echo "✅ All pages built successfully!"

    # Deploy to GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
        cname: yourdomain.github.io
